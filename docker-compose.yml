services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    networks:
      - ecommerce-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - ecommerce-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: local-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: data_engineer
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: ecommerce_warehouse
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-warehouse.sh:/docker-entrypoint-initdb.d/01-init-warehouse.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_engineer -d ecommerce_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4:8.0
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-producer
    depends_on:
      kafka:
        condition: service_started
      warehouse-consumer:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MAX_EVENTS=1000
    volumes:
      - ./producer_metrics.json:/app/producer_metrics.json
    networks:
      - ecommerce-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  warehouse-consumer:
    image: python:3.11-slim
    container_name: warehouse-consumer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: data_engineer
      DB_PASSWORD: supersecretpassword
      DB_NAME: ecommerce_warehouse
    volumes:
      - ./simple_consumer.py:/simple_consumer.py
    working_dir: /
    command: /bin/sh -c 'pip install kafka-python psycopg2-binary -q && python /simple_consumer.py'
    networks:
      - ecommerce-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  reader:
    image: python:3.11-slim
    container_name: data-reader
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: '1'
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: data_engineer
      DB_PASSWORD: supersecretpassword
      DB_NAME: ecommerce_warehouse
    volumes:
      - ./reader_oneliner.py:/reader.py
      - ./entrypoint.sh:/entrypoint.sh
      - ./output:/app/output
    working_dir: /app
    command: /bin/sh /entrypoint.sh
    networks:
      - ecommerce-network
    restart: 'no'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ecommerce-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
